name: Render explainer video

on:
  push:
    paths:
      - 'video/**'
      - '.github/workflows/render-video.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm deps
        working-directory: video
        run: npm ci

      - name: Cache TTS audio
        uses: actions/cache@v4
        with:
          path: video/public/audio
          key: tts-${{ hashFiles('video/src/data/script.tsx') }}
          restore-keys: tts-

      - name: Render TTS audio + MP4
        working-directory: video
        env:
          DEEPINFRA_TOKEN: ${{ secrets.DEEPINFRA_TOKEN }}
        run: |
          mkdir -p ~/.tokens
          echo "$DEEPINFRA_TOKEN" > ~/.tokens/deepinfra
          npm run build

      - name: Upload to video-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing asset if present
          gh release view video-latest --json assets -q '.assets[].name' 2>/dev/null | while read name; do
            gh release delete-asset video-latest "$name" --yes || true
          done
          # Create release if it doesn't exist
          gh release create video-latest --title "Explainer Video (latest)" \
            --notes "Auto-rendered from video/ source. Updated on every push to video/." \
            --latest=false 2>/dev/null || true
          # Upload
          gh release upload video-latest video/out/lathe-explainer.mp4 --clobber
