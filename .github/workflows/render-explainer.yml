name: Render explainer video

on:
  push:
    paths:
      - 'explainer-video/**'
      - '.github/workflows/render-explainer.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm deps
        working-directory: explainer-video
        run: npm ci

      - name: Cache TTS audio
        uses: actions/cache@v4
        with:
          path: explainer-video/public/audio
          key: tts-${{ hashFiles('explainer-video/src/data/script.tsx') }}
          restore-keys: tts-

      - name: Render TTS audio + MP4
        working-directory: explainer-video
        env:
          DEEPINFRA_TOKEN: ${{ secrets.DEEPINFRA_TOKEN }}
        run: |
          mkdir -p ~/.tokens
          echo "$DEEPINFRA_TOKEN" > ~/.tokens/deepinfra
          npm run build

      - name: Upload to explainer-video-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing asset if present
          gh release view explainer-video-latest --json assets -q '.assets[].name' 2>/dev/null | while read name; do
            gh release delete-asset explainer-video-latest "$name" --yes || true
          done
          # Create release if it doesn't exist
          gh release create explainer-video-latest --title "Explainer Video (latest)" \
            --notes "Auto-rendered from explainer-video/ source. Updated on every push." \
            --latest=false 2>/dev/null || true
          # Upload
          gh release upload explainer-video-latest \
            explainer-video/out/lathe-explainer.mp4 \
            explainer-video/out/lathe-explainer.vtt \
            --clobber
