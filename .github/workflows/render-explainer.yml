name: Render explainer video

on:
  push:
    paths:
      - 'explainer-video/**'
      - '.github/workflows/render-explainer.yml'
  workflow_run:
    workflows: ['Render demo video']
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: explainer-video-${{ github.event.workflow_run.head_sha || github.sha }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  render:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install npm deps
        working-directory: explainer-video
        run: npm ci

      - name: Check timeline consistency
        working-directory: explainer-video
        run: npm run check

      - name: Cache TTS audio
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: explainer-video/public/audio
          key: tts-${{ hashFiles('explainer-video/build.ts', 'explainer-video/package-lock.json', 'explainer-video/src/data/script.tsx') }}
          restore-keys: tts-

      - name: Download demo from triggering capture
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: demo-video-${{ github.event.workflow_run.head_sha }}
          path: explainer-video/public/images
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Render TTS audio, captions, and MP4
        working-directory: explainer-video
        env:
          DEEPINFRA_TOKEN: ${{ secrets.DEEPINFRA_TOKEN }}
        run: npm run build

      - name: Upload rendered artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: explainer-video-${{ github.event.workflow_run.head_sha || github.sha }}
          path: |
            explainer-video/out/lathe-explainer.mp4
            explainer-video/out/lathe-explainer.vtt
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: render
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == github.event.repository.default_branch) ||
      (github.event_name != 'workflow_run' && github.ref_name == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    concurrency:
      group: explainer-video-publication
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Download rendered artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: explainer-video-${{ github.event.workflow_run.head_sha || github.sha }}
          path: release

      - name: Publish latest release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view explainer-video-latest >/dev/null 2>&1; then
            gh release create explainer-video-latest --title "Explainer Video (latest)" --notes "Auto-rendered from explainer-video source." --latest=false
          fi
          gh release upload explainer-video-latest release/lathe-explainer.mp4 release/lathe-explainer.vtt --clobber
