name: Render demo video

on:
  push:
    paths:
      - 'lathe.py'
      - 'demo-video/**'
      - '.github/workflows/render-demo.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: demo-video-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install npm deps
        working-directory: demo-video
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: demo-video
        run: npx playwright install --with-deps chromium

      - name: Run capture
        working-directory: demo-video
        env:
          DEMO_OWUI_URL: ${{ secrets.DEMO_OWUI_URL }}
          DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
          DEMO_PASS: ${{ secrets.DEMO_PASS }}
          DEMO_MODEL: ${{ secrets.DEMO_MODEL }}
        run: node capture.mjs

      - name: Upload rendered artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: demo-video-${{ github.sha }}
          path: demo-video/out/demo.webm
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: capture
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    concurrency:
      group: demo-video-publication
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Download rendered artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: demo-video-${{ github.sha }}
          path: release

      - name: Publish latest release asset
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view demo-video-latest >/dev/null 2>&1; then
            gh release create demo-video-latest --title "Demo Video (latest)" --notes "Auto-captured Playwright demo session." --latest=false
          fi
          gh release upload demo-video-latest release/demo.webm --clobber
